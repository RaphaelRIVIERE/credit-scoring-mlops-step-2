services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scoring
      POSTGRES_PASSWORD: scoring
      POSTGRES_DB: predictions_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoring -d predictions_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scoring:scoring@postgres:5432/predictions_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
